<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#f0f0f0;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#141420;border-radius:28px;padding:40px;width:100%;max-width:580px;border:1px solid #1e1e30;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
  .logo{font-size:52px;text-align:center;margin-bottom:12px}
  h1{font-size:30px;font-weight:900;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{text-align:center;color:#555;font-size:13px;margin-bottom:32px;font-weight:600}
  .input-wrap{display:flex;gap:10px;margin-bottom:24px}
  input{flex:1;background:#1e1e2e;border:2px solid #2a2a3e;border-radius:14px;padding:15px 18px;color:#f0f0f0;font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border .2s}
  input:focus{border-color:#667eea}
  input::placeholder{color:#444}
  .btn-fetch{padding:15px 22px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:14px;color:white;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;white-space:nowrap}
  .btn-fetch:disabled{opacity:.5;cursor:not-allowed}
  .preview{display:none;background:#1a1a2a;border-radius:20px;padding:20px;margin-bottom:20px;border:1px solid #2a2a3e}
  .preview.show{display:block}
  .prev-top{display:flex;gap:16px;margin-bottom:16px}
  .prev-thumb{width:120px;height:68px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#2a2a3e}
  .prev-info{flex:1}
  .prev-title{font-size:14px;font-weight:800;margin-bottom:4px;line-height:1.4}
  .prev-meta{font-size:11px;color:#555;font-weight:600}
  .fmt-label{font-size:11px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .formats{display:flex;flex-direction:column;gap:8px}
  .fmt-btn{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#242436;border:2px solid #2a2a3e;border-radius:12px;cursor:pointer;transition:all .2s}
  .fmt-btn:hover{border-color:#667eea;background:#1e1e30}
  .fmt-btn.selected{border-color:#667eea;background:#1e1e30}
  .fmt-left{display:flex;align-items:center;gap:10px}
  .fmt-quality{font-size:15px;font-weight:800;color:#f0f0f0}
  .fmt-ext{font-size:10px;background:#2a2a3e;padding:2px 8px;border-radius:6px;color:#888;font-weight:700}
  .fmt-size{font-size:11px;color:#555;font-weight:600}
  .fmt-dl{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
  .fmt-dl:disabled{opacity:.5;cursor:not-allowed}
  .status{text-align:center;padding:16px;border-radius:12px;font-size:13px;font-weight:700;margin-top:16px;display:none}
  .status.show{display:block}
  .status.loading{background:rgba(102,126,234,0.15);color:#667eea;border:1px solid rgba(102,126,234,0.3)}
  .status.error{background:rgba(255,77,77,0.15);color:#ff4d4d;border:1px solid rgba(255,77,77,0.3)}
  .status.success{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
  .progress-wrap{display:none;margin-top:12px}
  .progress-wrap.show{display:block}
  .progress-bar-bg{width:100%;height:10px;background:#1e1e2e;border-radius:5px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:5px;transition:width .5s ease;width:0%}
  .progress-text{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#667eea;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎬</div>
  <h1>Video Downloader</h1>
  <p class="sub">YouTube • Facebook • TikTok • Instagram • 1000+ sites</p>

  <div class="input-wrap">
    <input type="text" id="url" placeholder="Paste video URL here..." />
    <button class="btn-fetch" id="fetchBtn" onclick="fetchInfo()">🔍 Get</button>
  </div>

  <div class="preview" id="preview">
    <div class="prev-top">
      <img class="prev-thumb" id="thumb" src="" alt="thumbnail" onerror="this.style.display='none'"/>
      <div class="prev-info">
        <div class="prev-title" id="vtitle"></div>
        <div class="prev-meta" id="vmeta"></div>
      </div>
    </div>
    <div class="fmt-label">Select Quality</div>
    <div class="formats" id="formats"></div>
  </div>

  <div class="status" id="status"></div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text">
      <span id="progressPct">0%</span>
      <span id="progressSize"></span>
    </div>
  </div>
</div>

<script>
  let currentUrl = '';
  let pollInterval = null;

  function fmtDur(s) {
    if (!s) return '';
    const m = Math.floor(s/60), sec = s%60;
    return m + ':' + String(sec).padStart(2,'0');
  }

  function fmtSize(b) {
    if (!b) return '';
    if (b > 1024*1024*1024) return (b/1024/1024/1024).toFixed(1)+'GB';
    if (b > 1024*1024) return (b/1024/1024).toFixed(1)+'MB';
    return (b/1024).toFixed(0)+'KB';
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status show ' + type;
  }

  function hideStatus() {
    document.getElementById('status').className = 'status';
  }

  function showProgress(pct, downloaded, total) {
    document.getElementById('progressWrap').className = 'progress-wrap show';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    if (total) {
      document.getElementById('progressSize').textContent = fmtSize(downloaded) + ' / ' + fmtSize(total);
    }
  }

  function hideProgress() {
    document.getElementById('progressWrap').className = 'progress-wrap';
    document.getElementById('progressFill').style.width = '0%';
  }

  function setAllBtns(disabled) {
    document.querySelectorAll('.fmt-dl').forEach(b => b.disabled = disabled);
    document.getElementById('fetchBtn').disabled = disabled;
  }

  async function fetchInfo() {
    const url = document.getElementById('url').value.trim();
    if (!url) return;
    currentUrl = url;
    document.getElementById('fetchBtn').disabled = true;
    document.getElementById('preview').classList.remove('show');
    hideProgress();
    showStatus('⏳ Fetching video info...', 'loading');

    try {
      const res = await fetch('/info', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({url})
      });
      const data = await res.json();
      if (data.error) { showStatus('❌ ' + data.error, 'error'); return; }

      document.getElementById('thumb').src = data.thumbnail || '';
      document.getElementById('vtitle').textContent = data.title || 'Video';
      document.getElementById('vmeta').textContent =
        (data.uploader ? data.uploader + ' · ' : '') + fmtDur(data.duration);

      const fmtDiv = document.getElementById('formats');
      fmtDiv.innerHTML = '';

      data.formats.forEach(f => {
        const div = document.createElement('div');
        div.className = 'fmt-btn';
        div.innerHTML = `
          <div class="fmt-left">
            <span class="fmt-quality">${f.quality}</span>
            <span class="fmt-ext">${f.ext.toUpperCase()}</span>
            ${f.filesize ? '<span class="fmt-size">~' + fmtSize(f.filesize) + '</span>' : ''}
          </div>
          <button class="fmt-dl" onclick="startDownload('${f.format_id}')">⬇ Download</button>
        `;
        fmtDiv.appendChild(div);
      });

      // Best quality button
      const best = document.createElement('button');
      best.style.cssText = 'width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:12px;color:white;font-size:14px;font-weight:800;font-family:Nunito,sans-serif;cursor:pointer;margin-top:10px';
      best.textContent = '⚡ Best Quality Download';
      best.onclick = () => startDownload('best');
      fmtDiv.appendChild(best);

      document.getElementById('preview').classList.add('show');
      hideStatus();
    } catch(e) {
      showStatus('❌ Error: ' + e.message, 'error');
    } finally {
      document.getElementById('fetchBtn').disabled = false;
    }
  }

  async function startDownload(formatId) {
    if (pollInterval) clearInterval(pollInterval);
    setAllBtns(true);
    showStatus('⏳ Starting download...', 'loading');
    showProgress(0, 0, 0);

    try {
      const res = await fetch('/download', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({url: currentUrl, format_id: formatId})
      });
      const data = await res.json();
      if (data.error) { showStatus('❌ ' + data.error, 'error'); setAllBtns(false); return; }

      const jobId = data.job_id;

      // Poll every 2 seconds
      pollInterval = setInterval(async () => {
        try {
          const s = await fetch('/status/' + jobId);
          const sdata = await s.json();

          const pct = sdata.percent || 0;
          showProgress(pct, sdata.downloaded || 0, sdata.total || 0);
          showStatus('⏳ Downloading... ' + pct + '% complete', 'loading');

          if (sdata.status === 'done') {
            clearInterval(pollInterval);
            showProgress(100, 0, 0);
            showStatus('✅ Done! Saving file...', 'success');

            // Trigger file download
            const a = document.createElement('a');
            a.href = '/file/' + jobId;
            a.download = (sdata.title || 'video') + '.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            setTimeout(() => {
              showStatus('✅ Download complete! Check your downloads folder.', 'success');
              setAllBtns(false);
            }, 1000);

          } else if (sdata.status === 'error') {
            clearInterval(pollInterval);
            hideProgress();
            showStatus('❌ ' + (sdata.message || 'Download failed'), 'error');
            setAllBtns(false);
          }
        } catch(e) {
          // keep polling silently
        }
      }, 2000);

    } catch(e) {
      showStatus('❌ Error: ' + e.message, 'error');
      hideProgress();
      setAllBtns(false);
    }
  }

  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchInfo();
  });
</script>
</body>
</html>
