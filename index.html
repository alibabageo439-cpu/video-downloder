<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#f0f0f0;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#141420;border-radius:28px;padding:36px;width:100%;max-width:620px;border:1px solid #1e1e30;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
h1{font-size:28px;font-weight:900;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#555;font-size:12px;margin-bottom:16px;font-weight:600}
.sites-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:24px}
.site{background:#1a1a2a;border:1px solid #2a2a3e;border-radius:10px;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;color:#888}
.site.green{color:#22c55e;border-color:rgba(34,197,94,0.25);background:rgba(34,197,94,0.06)}
.site.yellow{color:#f59e0b;border-color:rgba(245,158,11,0.25);background:rgba(245,158,11,0.06)}
.site .ico{font-size:18px;display:block;margin-bottom:3px}
.input-wrap{display:flex;gap:10px;margin-bottom:20px}
input{flex:1;background:#1e1e2e;border:2px solid #2a2a3e;border-radius:14px;padding:14px 16px;color:#f0f0f0;font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border .2s}
input:focus{border-color:#667eea}
input::placeholder{color:#3a3a4e}
.btn-fetch{padding:14px 20px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:14px;color:white;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-fetch:hover{opacity:.9}
.btn-fetch:disabled{opacity:.5;cursor:not-allowed}
.preview{display:none;background:#1a1a2a;border-radius:18px;padding:18px;margin-bottom:16px;border:1px solid #2a2a3e}
.preview.show{display:block}
.prev-top{display:flex;gap:14px;margin-bottom:14px}
.prev-thumb{width:110px;height:62px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#2a2a3e}
.prev-info{flex:1}
.prev-title{font-size:13px;font-weight:800;margin-bottom:3px;line-height:1.4}
.prev-meta{font-size:11px;color:#555;font-weight:600}
.prev-plat{display:inline-block;font-size:10px;background:#667eea22;color:#667eea;border:1px solid #667eea44;padding:2px 8px;border-radius:10px;font-weight:700;margin-top:4px}
.fmt-label{font-size:10px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.formats{display:flex;flex-direction:column;gap:6px}
.fmt-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#242436;border:1px solid #2a2a3e;border-radius:10px}
.fmt-left{display:flex;align-items:center;gap:8px}
.fmt-q{font-size:14px;font-weight:800}
.fmt-e{font-size:9px;background:#2a2a3e;padding:2px 7px;border-radius:5px;color:#666;font-weight:700}
.fmt-s{font-size:10px;color:#444;font-weight:600}
.fmt-dl{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:7px;padding:6px 14px;font-size:11px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
.fmt-dl:disabled{opacity:.5;cursor:not-allowed}
.best-btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:12px;color:white;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:8px}
.best-btn:disabled{opacity:.5;cursor:not-allowed}
.status{text-align:center;padding:14px;border-radius:12px;font-size:13px;font-weight:700;margin-top:12px;display:none;line-height:1.6}
.status.show{display:block}
.status.loading{background:rgba(102,126,234,0.12);color:#667eea;border:1px solid rgba(102,126,234,0.25)}
.status.error{background:rgba(255,77,77,0.12);color:#ff6b6b;border:1px solid rgba(255,77,77,0.25)}
.status.success{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
.prog-wrap{display:none;margin-top:10px}
.prog-wrap.show{display:block}
.prog-bg{width:100%;height:8px;background:#1e1e2e;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:4px;transition:width .4s ease;width:0%}
.prog-txt{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#667eea;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <h1>🎬 Video Downloader</h1>
  <p class="sub">Paste any video link — 1000+ websites supported</p>

  <div class="sites-grid">
    <div class="site green"><span class="ico">📱</span>TikTok</div>
    <div class="site green"><span class="ico">📘</span>Facebook</div>
    <div class="site green"><span class="ico">📸</span>Instagram</div>
    <div class="site green"><span class="ico">🐦</span>Twitter/X</div>
    <div class="site yellow"><span class="ico">▶️</span>YouTube</div>
    <div class="site green"><span class="ico">🎮</span>Twitch</div>
    <div class="site green"><span class="ico">🎥</span>Vimeo</div>
    <div class="site green"><span class="ico">🌐</span>1000+ more</div>
  </div>

  <div class="input-wrap">
    <input type="text" id="url" placeholder="Paste video URL here..."/>
    <button class="btn-fetch" id="fetchBtn" onclick="fetchInfo()">🔍 Get</button>
  </div>

  <div class="preview" id="preview">
    <div class="prev-top">
      <img class="prev-thumb" id="thumb" src="" alt="" onerror="this.style.display='none'"/>
      <div class="prev-info">
        <div class="prev-title" id="vtitle"></div>
        <div class="prev-meta" id="vmeta"></div>
        <div class="prev-plat" id="vplat"></div>
      </div>
    </div>
    <div class="fmt-label">Choose Quality</div>
    <div class="formats" id="formats"></div>
  </div>

  <div class="status" id="status"></div>

  <div class="prog-wrap" id="progWrap">
    <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt"><span id="progPct">0%</span><span id="progSz"></span></div>
  </div>
</div>

<script>
let curUrl='',pollT=null;

function fmtDur(s){if(!s)return '';const m=Math.floor(s/60),sec=s%60;return m+':'+String(sec).padStart(2,'0');}
function fmtSz(b){if(!b)return '';if(b>1073741824)return (b/1073741824).toFixed(1)+'GB';if(b>1048576)return (b/1048576).toFixed(1)+'MB';return (b/1024).toFixed(0)+'KB';}

function setStatus(msg,type){const e=document.getElementById('status');e.innerHTML=msg;e.className='status show '+type;}
function hideStatus(){document.getElementById('status').className='status';}
function setProgress(pct,dl,tot){
  document.getElementById('progWrap').className='prog-wrap show';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  if(tot)document.getElementById('progSz').textContent=fmtSz(dl)+' / '+fmtSz(tot);
}
function hideProgress(){document.getElementById('progWrap').className='prog-wrap';document.getElementById('progFill').style.width='0%';}
function setBtns(dis){document.querySelectorAll('.fmt-dl,.best-btn').forEach(b=>b.disabled=dis);document.getElementById('fetchBtn').disabled=dis;}

async function fetchInfo(){
  const url=document.getElementById('url').value.trim();
  if(!url){setStatus('⚠️ Please paste a video URL','error');return;}
  curUrl=url;
  document.getElementById('fetchBtn').disabled=true;
  document.getElementById('preview').classList.remove('show');
  hideProgress();
  setStatus('⏳ Fetching video info...','loading');

  try{
    const r=await fetch('/info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const d=await r.json();
    if(d.error){setStatus('❌ '+d.error,'error');return;}

    document.getElementById('thumb').src=d.thumbnail||'';
    document.getElementById('vtitle').textContent=d.title||'Video';
    document.getElementById('vmeta').textContent=(d.uploader?d.uploader+' · ':'')+fmtDur(d.duration);
    document.getElementById('vplat').textContent=d.platform||'';

    const fDiv=document.getElementById('formats');
    fDiv.innerHTML='';

    (d.formats||[]).forEach(f=>{
      const row=document.createElement('div');
      row.className='fmt-row';
      row.innerHTML=`<div class="fmt-left"><span class="fmt-q">${f.quality}</span><span class="fmt-e">${(f.ext||'MP4').toUpperCase()}</span>${f.filesize?'<span class="fmt-s">~'+fmtSz(f.filesize)+'</span>':''}</div><button class="fmt-dl" onclick="startDL('${f.format_id}')">⬇ Download</button>`;
      fDiv.appendChild(row);
    });

    const best=document.createElement('button');
    best.className='best-btn';
    best.textContent='⚡ Best Quality';
    best.onclick=()=>startDL('best');
    fDiv.appendChild(best);

    document.getElementById('preview').classList.add('show');
    hideStatus();
  }catch(e){
    setStatus('❌ '+e.message,'error');
  }finally{
    document.getElementById('fetchBtn').disabled=false;
  }
}

async function startDL(fmt){
  if(pollT)clearInterval(pollT);
  setBtns(true);
  setStatus('⏳ Starting download...','loading');
  setProgress(0,0,0);

  try{
    const r=await fetch('/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:curUrl,format_id:fmt})});
    const d=await r.json();
    if(d.error){setStatus('❌ '+d.error,'error');setBtns(false);hideProgress();return;}

    const jid=d.job_id;
    pollT=setInterval(async()=>{
      try{
        const s=await fetch('/status/'+jid);
        const sd=await s.json();
        const pct=sd.percent||0;
        setProgress(pct,sd.downloaded||0,sd.total||0);
        setStatus('⏳ Downloading... '+pct+'%','loading');

        if(sd.status==='done'){
          clearInterval(pollT);
          setProgress(100,0,0);
          setStatus('✅ Done! Saving file...','success');
          const a=document.createElement('a');
          a.href='/file/'+jid;
          a.download=(sd.title||'video')+'.mp4';
          document.body.appendChild(a);a.click();document.body.removeChild(a);
          setTimeout(()=>{setStatus('✅ Download complete! Check downloads folder 📁','success');setBtns(false);},1000);
        }else if(sd.status==='error'){
          clearInterval(pollT);
          hideProgress();
          setStatus('❌ '+( sd.message||'Download failed'),'error');
          setBtns(false);
        }
      }catch(e){}
    },2000);
  }catch(e){
    setStatus('❌ '+e.message,'error');
    hideProgress();
    setBtns(false);
  }
}

document.getElementById('url').addEventListener('keydown',e=>{if(e.key==='Enter')fetchInfo();});
</script>
</body>
</html>
