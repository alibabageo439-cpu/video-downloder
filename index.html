<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#f0f0f0;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#141420;border-radius:28px;padding:40px;width:100%;max-width:580px;border:1px solid #1e1e30;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
  .logo{font-size:52px;text-align:center;margin-bottom:12px}
  h1{font-size:30px;font-weight:900;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{text-align:center;color:#555;font-size:13px;margin-bottom:32px;font-weight:600}
  .input-wrap{display:flex;gap:10px;margin-bottom:16px}
  input{flex:1;background:#1e1e2e;border:2px solid #2a2a3e;border-radius:14px;padding:15px 18px;color:#f0f0f0;font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border .2s}
  input:focus{border-color:#667eea}
  input::placeholder{color:#444}
  .btn-fetch{padding:15px 22px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:14px;color:white;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
  .btn-fetch:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(102,126,234,0.4)}
  .btn-fetch:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .sites{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;justify-content:center}
  .site{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;color:#666}
  .preview{display:none;background:#1a1a2a;border-radius:20px;padding:20px;margin-bottom:20px;border:1px solid #2a2a3e}
  .preview.show{display:block}
  .prev-top{display:flex;gap:16px;margin-bottom:16px}
  .prev-thumb{width:120px;height:68px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#2a2a3e}
  .prev-info{flex:1}
  .prev-title{font-size:14px;font-weight:800;margin-bottom:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .prev-meta{font-size:11px;color:#555;font-weight:600}
  .formats{display:flex;flex-direction:column;gap:8px}
  .fmt-label{font-size:11px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .fmt-btn{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#242436;border:1px solid #2a2a3e;border-radius:12px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif}
  .fmt-btn:hover{border-color:#667eea;background:#1e1e30}
  .fmt-left{display:flex;align-items:center;gap:10px}
  .fmt-quality{font-size:15px;font-weight:800;color:#f0f0f0}
  .fmt-ext{font-size:10px;background:#2a2a3e;padding:2px 8px;border-radius:6px;color:#888;font-weight:700}
  .fmt-size{font-size:11px;color:#555;font-weight:600}
  .fmt-dl{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
  .fmt-dl:disabled{opacity:.5;cursor:not-allowed}
  .best-btn{width:100%;padding:16px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:14px;color:white;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:12px;transition:all .2s;box-shadow:0 4px 20px rgba(102,126,234,0.3)}
  .best-btn:hover{transform:scale(1.02);box-shadow:0 6px 30px rgba(102,126,234,0.5)}
  .best-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .status{text-align:center;padding:14px;border-radius:12px;font-size:13px;font-weight:700;margin-top:16px;display:none}
  .status.show{display:block}
  .status.loading{background:rgba(102,126,234,0.15);color:#667eea;border:1px solid rgba(102,126,234,0.3)}
  .status.error{background:rgba(255,77,77,0.15);color:#ff4d4d;border:1px solid rgba(255,77,77,0.3)}
  .status.success{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
  .progress{width:100%;height:6px;background:#1e1e2e;border-radius:3px;margin-top:10px;display:none;overflow:hidden}
  .progress.show{display:block}
  .progress-bar{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;width:0%;transition:width .3s;animation:prog 2s infinite}
  @keyframes prog{0%{width:0%}50%{width:70%}100%{width:90%}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⬇️</div>
  <h1>Video Downloader</h1>
  <div class="sub">Paste any video URL and download instantly</div>

  <div class="input-wrap">
    <input type="text" id="url" placeholder="Paste video URL here..." />
    <button class="btn-fetch" id="fetchBtn" onclick="fetchInfo()">Get Video</button>
  </div>

  <div class="sites">
    <span class="site">▶ YouTube</span>
    <span class="site">📘 Facebook</span>
    <span class="site">📸 Instagram</span>
    <span class="site">🎵 TikTok</span>
    <span class="site">🐦 Twitter</span>
    <span class="site">+ 1000 more</span>
  </div>

  <div class="preview" id="preview">
    <div class="prev-top">
      <img class="prev-thumb" id="thumb" src="" alt="thumbnail" onerror="this.style.display='none'"/>
      <div class="prev-info">
        <div class="prev-title" id="vtitle"></div>
        <div class="prev-meta" id="vmeta"></div>
      </div>
    </div>
    <div class="fmt-label">Choose Quality</div>
    <div class="formats" id="formats"></div>
    <button class="best-btn" id="bestBtn" onclick="downloadBest()">⬇️ Download Best Quality</button>
  </div>

  <div class="status" id="status"></div>
  <div class="progress" id="progress"><div class="progress-bar"></div></div>
</div>

<script>
  let currentUrl = '';
  let currentFormats = [];

  function showStatus(msg, type) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status show ' + type;
    if (type === 'loading') {
      document.getElementById('progress').classList.add('show');
    } else {
      document.getElementById('progress').classList.remove('show');
    }
  }

  function hideStatus() {
    document.getElementById('status').className = 'status';
    document.getElementById('progress').classList.remove('show');
  }

  function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes > 1024*1024*1024) return (bytes/1024/1024/1024).toFixed(1) + ' GB';
    if (bytes > 1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
    return (bytes/1024).toFixed(0) + ' KB';
  }

  function fmtDur(secs) {
    if (!secs) return '';
    const m = Math.floor(secs/60), s = secs%60;
    return m + ':' + String(s).padStart(2,'0');
  }

  async function fetchInfo() {
    const url = document.getElementById('url').value.trim();
    if (!url) { showStatus('Please paste a video URL!', 'error'); return; }
    currentUrl = url;
    document.getElementById('fetchBtn').disabled = true;
    document.getElementById('preview').classList.remove('show');
    showStatus('⏳ Fetching video info...', 'loading');

    try {
      const res = await fetch('/info', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({url})
      });
      const data = await res.json();
      if (data.error) { showStatus('❌ ' + data.error, 'error'); return; }

      document.getElementById('thumb').src = data.thumbnail || '';
      document.getElementById('vtitle').textContent = data.title || 'Video';
      document.getElementById('vmeta').textContent =
        (data.uploader ? data.uploader + ' · ' : '') + fmtDur(data.duration);

      const fmtDiv = document.getElementById('formats');
      fmtDiv.innerHTML = '';
      currentFormats = data.formats;

      data.formats.forEach(f => {
        const div = document.createElement('div');
        div.className = 'fmt-btn';
        div.innerHTML = `
          <div class="fmt-left">
            <span class="fmt-quality">${f.quality}</span>
            <span class="fmt-ext">${f.ext}</span>
            ${f.filesize ? '<span class="fmt-size">~' + fmtSize(f.filesize) + '</span>' : ''}
          </div>
          <button class="fmt-dl" onclick="downloadFormat('${f.format_id}')">⬇️ Download</button>
        `;
        fmtDiv.appendChild(div);
      });

      document.getElementById('preview').classList.add('show');
      hideStatus();
    } catch(e) {
      showStatus('❌ Error: ' + e.message, 'error');
    } finally {
      document.getElementById('fetchBtn').disabled = false;
    }
  }

  async function downloadFormat(formatId) {
    startDownload(formatId);
  }

  async function downloadBest() {
    startDownload('best');
  }

  async function startDownload(formatId) {
    showStatus('⏳ Starting download... Please wait!', 'loading');
    document.getElementById('bestBtn').disabled = true;

    try {
      // Step 1: Start the job
      const res = await fetch('/download', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({url: currentUrl, format_id: formatId})
      });
      const data = await res.json();
      if (data.error) { showStatus('❌ ' + data.error, 'error'); return; }

      const jobId = data.job_id;
      let dots = 0;

      // Step 2: Poll status every 3 seconds
      const interval = setInterval(async () => {
        dots = (dots + 1) % 4;
        showStatus('⏳ Downloading' + '.'.repeat(dots + 1) + ' Please wait!', 'loading');
        try {
          const s = await fetch('/status/' + jobId);
          const sdata = await s.json();

          if (sdata.status === 'done') {
            clearInterval(interval);
            showStatus('✅ Ready! Saving file...', 'success');
            // Step 3: Download the file
            const a = document.createElement('a');
            a.href = '/file/' + jobId;
            a.download = (sdata.title || 'video') + '.mp4';
            a.click();
            showStatus('✅ Download started! Check your downloads folder.', 'success');
            document.getElementById('bestBtn').disabled = false;
          } else if (sdata.status === 'error') {
            clearInterval(interval);
            showStatus('❌ ' + (sdata.message || 'Download failed'), 'error');
            document.getElementById('bestBtn').disabled = false;
          }
        } catch(e) {
          // keep polling
        }
      }, 3000);

    } catch(e) {
      showStatus('❌ Error: ' + e.message, 'error');
      document.getElementById('bestBtn').disabled = false;
    }
  }

  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchInfo();
  });
</script>
</body>
</html>
